<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sigilo Carioca • Entrar</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand">
        <b>Sigilo Carioca</b>
        <span>Encontros no RJ, do seu jeito.</span>
      </div>
      <span class="badge">RJ • Discreto • Local</span>
    </div>

    <div class="card">
      <p class="h1">Entrar ou criar conta</p>
      <p class="p">Use email e senha. Em 1 minuto você cria seu perfil.</p>
      <hr/>

      <div class="row">
        <input class="input" placeholder="Email" type="email"/>
        <input class="input" placeholder="Senha" type="password"/>
      </div>

      <div class="row" style="margin-top:10px">
        <button class="btn primary">Entrar</button>
        <button class="btn">Criar conta</button>
      </div>

      <p class="p" style="margin-top:10px">* Nesta fase é só visual. Depois ligamos o login e o banco de dados.</p>
    </div>
  </div>
</body>
</html>
